<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.06)" />
    </pattern>
    <radialGradient id="glow" cx="18%" cy="55%" r="60%">
      <stop offset="0%" stop-color="#E32727" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#050505" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#4BA3FF" stop-opacity="0.07" />
      <stop offset="100%" stop-color="#050505" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="#050505" />
  <rect width="1200" height="400" fill="url(#dots)" />
  <rect width="1200" height="400" fill="url(#glow)" />
  <rect width="1200" height="400" fill="url(#glow2)" />

  <!-- RP.ONE wordmark -->
  <text x="600" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="110" font-weight="900" letter-spacing="-3">
    <tspan fill="#ffffff">RP</tspan><tspan fill="#E32727">.</tspan><tspan fill="rgba(255,255,255,0.35)">ONE</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.45)" letter-spacing="0.5">The velocity layer of digital money</text>
</svg>
